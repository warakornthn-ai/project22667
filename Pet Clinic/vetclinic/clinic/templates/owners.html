{% extends 'base.html' %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h3 class="mb-3">👤 รายชื่อเจ้าของ</h3>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                </tr>
            </thead>

            <tbody>
                {% for o in owners %}
                <tr>
                    <td>{{ o.owner_id }}</td>
                    <td>{{ o.name }}</td>
                    <td>{{ o.phone }}</td>
                    <td>{{ o.email }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
