<!DOCTYPE html>
<html>
<head>
    <title>เพิ่มนัด</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<a href="/appointments/add/" class="btn btn-primary mb-3">➕ เพิ่มนัด</a>
<h2>📅 เพิ่มนัดหมาย</h2>

<form method="post">
    {% csrf_token %}
    
    <div class="mb-3">
        {{ form.pet.label_tag }}
        {{ form.pet }}
    </div>

    <div class="mb-3">
        {{ form.vet.label_tag }}
        {{ form.vet }}
    </div>

    <div class="mb-3">
        {{ form.appointment_date.label_tag }}
        {{ form.appointment_date }}
    </div>

    <div class="mb-3">
        {{ form.status.label_tag }}
        {{ form.status }}
    </div>

    <div class="mb-3">
        {{ form.note.label_tag }}
        {{ form.note }}
    </div>

    <button type="submit" class="btn btn-success">💾 บันทึก</button>
    <a href="/appointments/" class="btn btn-secondary">ยกเลิก</a>
</form>

</body>
</html>
