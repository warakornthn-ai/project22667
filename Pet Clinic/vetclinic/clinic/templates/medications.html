{% extends 'base.html' %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h3 class="mb-3">💊 รายการยา</h3>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Description</th>
                </tr>
            </thead>

            <tbody>
                {% for m in medications %}
                <tr>
                    <td>{{ m.med_id }}</td>
                    <td>{{ m.name }}</td>
                    <td>{{ m.type }}</td>
                    <td>{{ m.description }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
