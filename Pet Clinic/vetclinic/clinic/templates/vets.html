{% extends 'base.html' %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h3 class="mb-3">👨‍⚕️ สัตวแพทย์</h3>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Position</th>
                </tr>
            </thead>

            <tbody>
                {% for v in vets %}
                <tr>
                    <td>{{ v.vet_id }}</td>
                    <td>{{ v.name }}</td>
                    <td>{{ v.position }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
