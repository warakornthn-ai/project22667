{% extends 'base.html' %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h3 class="mb-3">📋 ใบสั่งยา</h3>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Record</th>
                    <th>Pet</th>
                    <th>Medicine</th>
                    <th>Dosage</th>
                </tr>
            </thead>

            <tbody>
                {% for p in prescriptions %}
                <tr>
                    <td>{{ p.record.record_id }}</td>
                    <td>{{ p.record.pet.name }}</td>
                    <td>{{ p.medicine.name }}</td>
                    <td>{{ p.dosage }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
