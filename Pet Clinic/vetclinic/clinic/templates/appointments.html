{% extends 'base.html' %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h3 class="mb-3">📅 รายการนัดหมาย</h3>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Pet</th>
                    <th>Vet</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Note</th>
                </tr>
            </thead>

            <tbody>
                {% for a in appointments %}
                <tr>
                    <td>{{ a.appointment_id }}</td>
                    <td>{{ a.pet.name }}</td>
                    <td>{{ a.vet.name }}</td>
                    <td>{{ a.appointment_date }}</td>
                    <td>{{ a.status }}</td>
                    <td>{{ a.note }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
