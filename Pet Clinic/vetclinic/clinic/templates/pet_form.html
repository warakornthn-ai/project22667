<!DOCTYPE html>
<html>
<head>
    <title>Edit Pet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>✏️ แก้ไขข้อมูลสัตว์</h2>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" value="{{ pet.name }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Species</label>
        <input type="text" name="species" value="{{ pet.species }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Breed</label>
        <input type="text" name="breed" value="{{ pet.breed }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Gender</label>
        <input type="text" name="gender" value="{{ pet.gender }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Birthdate</label>
        <input type="date" name="birthdate" value="{{ pet.birthdate|date:'Y-m-d' }}" class="form-control">
    </div>

    <button type="submit" class="btn btn-success">💾 บันทึก</button>
    <a href="/" class="btn btn-secondary">ยกเลิก</a>

</form>

</body>
</html>
